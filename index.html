<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiLB Prospect Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0c10;
  --surface:  #111318;
  --surface2: #1a1d24;
  --surface3: #22262f;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e8eaf0;
  --muted:    #6b7280;
  --accent:   #e8ff47;
  --accent2:  #47d4ff;
  --red:      #ff4f4f;
  --green:    #4fffb0;
  --amber:    #ffb347;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:1rem;flex-wrap:wrap;}
.logo{display:flex;align-items:baseline;gap:.5rem;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:var(--accent);line-height:1;}
.logo-sub{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}
.header-actions{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.last-updated{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
.btn-primary{background:var(--accent);color:#0a0c10;}
.btn-primary:hover{background:#d4eb30;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* YEAR SELECTOR */
.year-bar{display:flex;align-items:center;gap:6px;padding:.75rem 2.5rem;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.year-label{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;margin-right:4px;}
.year-chip{padding:4px 14px;border-radius:100px;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.year-chip:hover{color:var(--text);border-color:rgba(255,255,255,.25);}
.year-chip.active{background:var(--accent);color:#0a0c10;border-color:var(--accent);}

/* TABS */
.tabs{display:flex;gap:0;padding:0 2.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
.tab{padding:.85rem 1.1rem;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
.main{padding:1.75rem 2.5rem;max-width:1700px;margin:0 auto;}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.75rem;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;}
.summary-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.summary-value{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;color:var(--text);}
.summary-value.accent{color:var(--accent);}
.summary-value.green{color:var(--green);}
.summary-value.amber{color:var(--amber);}
.summary-sub{font-size:.62rem;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}

/* FILTER ROW */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.sort-label{font-size:.75rem;color:var(--muted);white-space:nowrap;}
.sort-select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;padding:5px 10px;cursor:pointer;}

/* PLAYER GRID */
.section-heading{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem;margin-top:1.5rem;display:flex;align-items:center;gap:8px;}
.section-heading::after{content:'';flex:1;height:1px;background:var(--border);}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;}

/* PLAYER CARD */
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color .15s,transform .15s;position:relative;overflow:hidden;}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .15s;}
.player-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.player-card:hover::before{opacity:1;}
.player-card.no-stats{opacity:.5;}
.player-card.pitcher::before{background:var(--accent2);}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-name{font-weight:600;font-size:.95rem;color:var(--text);line-height:1.2;}
.card-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}

.badge{font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 6px;border-radius:4px;border:1px solid transparent;letter-spacing:.04em;}
.badge-pos{background:#1a2a40;border-color:#1e4080;color:#7eb8f7;}
.badge-level{background:#1a2e1a;border-color:#1a5c1a;color:#6bdb6b;}
.badge-team{background:#2a1f1f;border-color:#5c2020;color:#e87b7b;}
.badge-year{background:#2a2010;border-color:#5c4010;color:#f0c060;}

.card-remove{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:1rem;line-height:1;transition:all .15s;flex-shrink:0;}
.card-remove:hover{color:var(--red);background:rgba(255,79,79,.1);}

/* SPLITS TABLE */
.splits-wrap{margin-top:8px;}
.splits-toggle{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;transition:all .15s;}
.splits-toggle:hover{color:var(--text);border-color:var(--border2);}
.splits-toggle .arrow{transition:transform .15s;display:inline-block;}
.splits-toggle.open .arrow{transform:rotate(90deg);}

.splits-table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:.7rem;}
.splits-table th{color:var(--muted);font-weight:500;padding:4px 5px;text-align:right;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;font-size:.58rem;}
.splits-table th:first-child{text-align:left;}
.splits-table td{padding:4px 5px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);}
.splits-table td:first-child{text-align:left;color:var(--muted);}
.splits-table tr.total-row td{color:var(--accent);font-weight:500;border-top:1px solid var(--border2);border-bottom:none;}
.splits-table tr.total-row td:first-child{color:var(--accent);}
.splits-table .hot{color:var(--accent);}
.splits-table .good{color:var(--green);}
.splits-table .bad{color:var(--red);}

/* quick stats (collapsed view) */
.quick-stats{display:grid;gap:4px;}
.quick-stats.hitter{grid-template-columns:repeat(8,1fr);}
.quick-stats.pitcher{grid-template-columns:repeat(7,1fr);}
.stat-cell{background:var(--surface2);border-radius:5px;padding:5px 2px;text-align:center;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.stat-val{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;color:var(--text);}
.stat-val.hot{color:var(--accent);}
.stat-val.good{color:var(--green);}
.no-stats-msg{font-size:.75rem;color:var(--muted);font-style:italic;margin-top:4px;}

/* PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
.panel-overlay.open{opacity:1;pointer-events:all;}
.panel{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:2rem;width:100%;max-width:560px;transform:translateY(20px);transition:transform .2s;}
.panel-overlay.open .panel{transform:translateY(0);}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;color:var(--accent);}
.panel-close{background:transparent;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px;border-radius:6px;transition:all .15s;line-height:1;}
.panel-close:hover{color:var(--text);background:var(--surface2);}
/* type toggle removed — type auto-detected from position */
.search-row{display:flex;gap:8px;margin-bottom:1rem;}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:10px 14px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.search-btn{background:var(--accent);color:#0a0c10;border:none;border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:background .15s;white-space:nowrap;}
.search-btn:hover{background:#d4eb30;}
.search-btn:disabled{opacity:.5;cursor:not-allowed;}
.search-results{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.result-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;}
.result-item:hover{border-color:var(--border2);background:var(--surface3);}
.result-item.already-added{opacity:.4;pointer-events:none;}
.result-name{font-weight:500;font-size:.9rem;}
.result-meta{font-size:.75rem;color:var(--muted);margin-top:2px;}
.result-add{background:var(--accent);color:#0a0c10;border:none;border-radius:5px;padding:5px 12px;font-weight:600;font-size:.75rem;cursor:pointer;transition:background .15s;white-space:nowrap;}
.result-add:hover{background:#d4eb30;}
.search-status{font-size:.8rem;color:var(--muted);text-align:center;padding:1rem;font-style:italic;}
.manual-section{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);}
.manual-label{font-size:.7rem;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;}
.manual-row{display:grid;grid-template-columns:1fr 100px 60px 60px;gap:6px;}
.manual-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:8px 10px;outline:none;transition:border-color .15s;width:100%;}
.manual-input:focus{border-color:var(--accent);}
.manual-input::placeholder{color:var(--muted);font-size:.72rem;}
.manual-add-btn{background:var(--surface3);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;width:100%;}
.manual-add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* MISC */
.loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.refresh-icon{display:inline-block;transition:transform .3s;}
.refreshing .refresh-icon{animation:spin .6s linear infinite;}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);margin-bottom:.5rem;letter-spacing:.05em;}
.empty-desc{font-size:.85rem;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:.85rem;z-index:999;transform:translateY(100px);opacity:0;transition:all .25s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── GAME LOG VIEW ── */
.gamelog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;}
.gamelog-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}
.gamelog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;}
.gamelog-card:hover::before{opacity:1;}
.gamelog-card.pitcher-card::before{background:var(--accent2);}
.gamelog-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.gamelog-name{font-weight:600;font-size:.92rem;color:var(--text);}
.gamelog-meta{font-size:.72rem;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
.gamelog-entries{display:flex;flex-direction:column;gap:6px;}
.gamelog-entry{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.gamelog-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.gamelog-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
.gamelog-opponent{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
.gamelog-result{font-family:'DM Mono',monospace;font-size:.65rem;padding:1px 6px;border-radius:3px;}
.gamelog-result.win{background:rgba(79,255,176,.1);color:var(--green);border:1px solid rgba(79,255,176,.25);}
.gamelog-result.loss{background:rgba(255,79,79,.1);color:var(--red);border:1px solid rgba(255,79,79,.25);}
.gamelog-result.nd{background:var(--surface3);color:var(--muted);border:1px solid var(--border2);}
.gamelog-stats{display:flex;gap:4px;flex-wrap:wrap;}
.gl-stat{background:var(--surface3);border-radius:4px;padding:3px 7px;text-align:center;min-width:36px;}
.gl-stat-lbl{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.gl-stat-val{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;color:var(--text);}
.gl-stat-val.hot{color:var(--accent);}
.gl-stat-val.good{color:var(--green);}
.gl-stat-val.bad{color:var(--red);}
.gamelog-loading{text-align:center;padding:1.5rem;color:var(--muted);font-size:.8rem;font-style:italic;}
.gamelog-empty{text-align:center;padding:1rem;color:var(--muted);font-size:.75rem;font-style:italic;}
.new-badge{font-family:'DM Mono',monospace;font-size:.58rem;background:rgba(232,255,71,.15);border:1px solid rgba(232,255,71,.35);color:var(--accent);padding:2px 6px;border-radius:3px;margin-left:4px;}

/* ── RANKINGS VIEW ── */
.rankings-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;}
.rank-filter-chip{padding:4px 12px;border-radius:100px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.rank-filter-chip:hover{color:var(--text);border-color:rgba(255,255,255,.25);}
.rank-filter-chip.active{background:var(--accent);color:#0a0c10;border-color:var(--accent);}
.rankings-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
.rankings-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.rankings-table th{background:var(--surface2);font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;}
.rankings-table th:hover{color:var(--text);}
.rankings-table th.sorted{color:var(--accent);}
.rankings-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.rankings-table tr:last-child td{border-bottom:none;}
.rankings-table tr:hover td{background:var(--surface2);}
.rankings-table tr.my-player td{background:rgba(232,255,71,.04);}
.rankings-table tr.my-player td:first-child{border-left:2px solid var(--accent);}
.rank-num{font-family:'DM Mono',monospace;color:var(--muted);font-size:.72rem;}
.rank-name{font-weight:600;color:var(--text);}
.rank-name.my-player-name{color:var(--accent);}
.my-badge{font-family:'DM Mono',monospace;font-size:.55rem;background:rgba(232,255,71,.15);border:1px solid rgba(232,255,71,.35);color:var(--accent);padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;}
.fv-badge{font-family:'DM Mono',monospace;font-size:.72rem;padding:2px 8px;border-radius:4px;font-weight:600;}
.fv-70{background:rgba(79,255,176,.15);color:var(--green);border:1px solid rgba(79,255,176,.3);}
.fv-65{background:rgba(79,255,176,.1);color:#7ef7c4;border:1px solid rgba(79,255,176,.2);}
.fv-60{background:rgba(232,255,71,.1);color:var(--accent);border:1px solid rgba(232,255,71,.2);}
.fv-55{background:rgba(255,179,71,.1);color:var(--amber);border:1px solid rgba(255,179,71,.2);}
.fv-50{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
.fv-low{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.eta-badge{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);}
.eta-now{color:var(--green)!important;font-weight:600;}
.risk-low{color:var(--green);font-family:'DM Mono',monospace;font-size:.68rem;}
.risk-med{color:var(--amber);font-family:'DM Mono',monospace;font-size:.68rem;}
.risk-high{color:#ff8c4a;font-family:'DM Mono',monospace;font-size:.68rem;}
.risk-ext{color:var(--red);font-family:'DM Mono',monospace;font-size:.68rem;}
.grade-cell{font-family:'DM Mono',monospace;font-size:.7rem;text-align:center;white-space:nowrap;}
.grade-plus{color:var(--green);}
.grade-avg{color:var(--text);}
.grade-below{color:var(--muted);}
.rank-search{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:6px 12px;outline:none;width:200px;}
.rank-search:focus{border-color:var(--accent);}
.rank-search::placeholder{color:var(--muted);}
.rankings-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-left:auto;}
.no-rank-msg{text-align:center;padding:3rem;color:var(--muted);font-size:.85rem;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <span class="logo-main">MiLB Tracker</span>
    <span class="logo-sub" id="season-label">2026 Season</span>
  </div>
  <div class="header-actions">
    <span class="last-updated" id="last-updated">—</span>
    <span id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-left:4px;"></span>
    <span id="sync-text" style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);">connecting…</span>
    <button class="btn btn-ghost" id="refresh-btn" onclick="refreshAllStats()">
      <span class="refresh-icon">↻</span> Refresh
    </button>
    <button class="btn btn-primary" onclick="openPanel()">+ Add Player</button>
  </div>
</header>

<!-- YEAR SELECTOR -->
<div class="year-bar">
  <span class="year-label">Season</span>
  <div id="year-chips"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('all',this)">All</div>
  <div class="tab" onclick="switchTab('hitters',this)">Hitters</div>
  <div class="tab" onclick="switchTab('pitchers',this)">Pitchers</div>
  <div class="tab" onclick="switchTab('active',this)">Has Stats</div>
  <div class="tab" onclick="switchTab('nostats',this)">No Stats Yet</div>
  <div class="tab" onclick="switchTab('gamelogs',this)">Recent Activity</div>
  <div class="tab" onclick="switchTab('rankings',this)">Rankings</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="summary-bar" id="summary-bar"></div>
  <div class="filter-row">
    <span class="sort-label">Sort by</span>
    <select class="sort-select" onchange="renderRoster()" id="sort-select">

// ── MLB STATS API ─────────────────────────────────────────────────────────────
async function fetchRawSplits(mlb_id, group, year) {
  const all = [];

  // Fetch MiLB levels (sportIds 11-17) in parallel
  const milbIds = [11, 12, 13, 14, 16, 17];
  await Promise.all(milbIds.map(async sportId => {
    try {
      const url = `${MLB_API}/people/${mlb_id}/stats?stats=season&season=${year}&group=${group}&sportId=${sportId}`;
      const r = await fetch(url);
      if (!r.ok) return;
      const d = await r.json();
      for (const block of (d.stats || [])) {
        for (const split of (block.splits || [])) {
          split._sportId = sportId;
          all.push(split);
        }
      }
    } catch(e) {}
  }));

  // Fetch MLB (sportId=1) separately — uses same endpoint but returns different structure
  try {
    const url = `${MLB_API}/people/${mlb_id}/stats?stats=season&season=${year}&group=${group}&sportId=1`;
    const r = await fetch(url);
    if (r.ok) {
      const d = await r.json();
      for (const block of (d.stats || [])) {
        for (const split of (block.splits || [])) {
          split._sportId = 1;
          all.push(split);
        }
      }
    }
  } catch(e) {}

  return all;
}

// Group raw splits by team+level, combine stats within each group
function groupSplitsByLevel(rawSplits, type) {
  // Each raw split is one season at one team/level
  // (the API already returns one entry per team per sportId)
  const groups = [];
  for (const s of rawSplits) {
    const teamName  = s.team?.name || 'Unknown';
    const sportId   = s._sportId;
    const levelAbbr = SPORT_LABELS[sportId] || '?';
    if (type === 'hitter') {
      const st = s.stat || {};
      groups.push({
        team: teamName, level: levelAbbr, sportId,
        g:   st.gamesPlayed      || 0,
        pa:  st.plateAppearances || 0,
        ab:  st.atBats           || 0,
        r:   st.runs             || 0,
        h:   st.hits             || 0,
        d:   st.doubles          || 0,
        t:   st.triples          || 0,
        hr:  st.homeRuns         || 0,
        rbi: st.rbi              || 0,
        sb:  st.stolenBases      || 0,
        bb:  st.baseOnBalls      || 0,
        so:  st.strikeOuts       || 0,
      });
    } else {
      const st = s.stat || {};
      const raw  = parseFloat(st.inningsPitched || 0);
      const full = Math.floor(raw);
      const frac = Math.round((raw - full) * 10);
      groups.push({
        team: teamName, level: levelAbbr, sportId,
        g:      st.gamesPlayed  || 0,
        gs:     st.gamesStarted || 0,
        w:      st.wins         || 0,
        l:      st.losses       || 0,
        sv:     st.saves        || 0,
        ipOuts: full * 3 + frac,
        hits:   st.hits         || 0,
        er:     st.earnedRuns   || 0,
        bb:     st.baseOnBalls  || 0,
        so:     st.strikeOuts   || 0,
      });
    }
  }
  // Sort by level (MLB first, then AAA down)
  const order = {1:0, 11:1, 12:2, 13:3, 14:4, 16:5, 17:6};
  groups.sort((a,b) => (order[a.sportId]||9) - (order[b.sportId]||9));
  return groups;
}

function calcHitterDerived(t) {
  t.avg = t.ab ? (t.h/t.ab).toFixed(3).replace(/^0/,'') : '.000';
  t.obp = t.pa ? ((t.h+t.bb)/t.pa).toFixed(3).replace(/^0/,'') : '.000';
  const tb = (t.h - (t.d||0) - (t.t||0) - (t.hr||0)) + (t.d||0)*2 + (t.t||0)*3 + (t.hr||0)*4;
  t.slg = t.ab ? (tb/t.ab).toFixed(3).replace(/^0/,'') : '.000';
  const obpF = parseFloat('0'+t.obp)||0;
  const slgF = parseFloat('0'+t.slg)||0;
  t.ops = (obpF+slgF).toFixed(3).replace(/^0/,'');
  const avgF = parseFloat('0'+t.avg)||0;
  t.iso = Math.max(0, slgF-avgF).toFixed(3).replace(/^0/,'');
  return t;
}

function sumHitterGroups(groups) {
  const t = {g:0,pa:0,ab:0,r:0,h:0,d:0,t:0,hr:0,rbi:0,sb:0,bb:0,so:0};
  for (const g of groups) {
    t.g+=g.g; t.pa+=g.pa; t.ab+=g.ab; t.r+=g.r; t.h+=g.h;
    t.d+=g.d||0; t.t+=g.t||0;
    t.hr+=g.hr; t.rbi+=g.rbi; t.sb+=g.sb; t.bb+=g.bb; t.so+=g.so;
  }
  return calcHitterDerived(t);
}

function sumPitcherGroups(groups) {
  const t = {g:0,gs:0,w:0,l:0,sv:0,ipOuts:0,hits:0,er:0,bb:0,so:0};
  for (const g of groups) {
    t.g+=g.g; t.gs+=g.gs; t.w+=g.w; t.l+=g.l; t.sv+=g.sv;
    t.ipOuts+=g.ipOuts; t.hits+=g.hits; t.er+=g.er; t.bb+=g.bb; t.so+=g.so;
  }
  const outs = t.ipOuts;
  t.ip   = `${Math.floor(outs/3)}.${outs%3}`;
  t.era  = outs ? ((t.er*27)/outs).toFixed(2) : '—';
  t.whip = outs ? (((t.hits+t.bb)*3)/outs).toFixed(2) : '—';
  t.k9   = outs ? ((t.so*27)/outs).toFixed(1) : '—';
  t.wl   = `${t.w}-${t.l}`;
  return t;
}

function addHitterDerived(row) {
  return calcHitterDerived(row);
}

function addPitcherDerived(row) {
  const outs = row.ipOuts;
  row.ip   = `${Math.floor(outs/3)}.${outs%3}`;
  row.era  = outs ? ((row.er*27)/outs).toFixed(2) : '—';
  row.whip = outs ? (((row.hits+row.bb)*3)/outs).toFixed(2) : '—';
  return row;
}

// Compute combined totals across all years for a player
function getAllYearsTotals(p) {
  const allSplits = []; // flat list of {year, level, team, sportId, ...stats}
  for (const year of ALL_YEARS) {
    const cached = statsCache[cacheKey(p.mlb_id, year)];
    if (!cached?.splits?.length) continue;
    for (const split of cached.splits) {
      allSplits.push({ ...split, year });
    }
  }
  if (allSplits.length === 0) return null;

  if (p.type === 'hitter') {
    const totals = allSplits.reduce((t, s) => {
      t.g+=s.g; t.pa+=s.pa; t.ab+=s.ab; t.r+=s.r; t.h+=s.h;
      t.d+=(s.d||0); t.t+=(s.t||0); t.hr+=s.hr; t.rbi+=s.rbi;
      t.sb+=s.sb; t.bb+=s.bb; t.so+=s.so;
      return t;
    }, {g:0,pa:0,ab:0,r:0,h:0,d:0,t:0,hr:0,rbi:0,sb:0,bb:0,so:0});
    return calcHitterDerived(totals);
  } else {
    const totals = allSplits.reduce((t, s) => {
      t.g+=s.g; t.gs+=s.gs; t.w+=s.w; t.l+=s.l; t.sv+=s.sv;
      t.ipOuts+=s.ipOuts; t.hits+=s.hits; t.er+=s.er; t.bb+=s.bb; t.so+=s.so;
      return t;
    }, {g:0,gs:0,w:0,l:0,sv:0,ipOuts:0,hits:0,er:0,bb:0,so:0});
    const outs = totals.ipOuts;
    totals.ip   = `${Math.floor(outs/3)}.${outs%3}`;
    totals.era  = outs ? ((totals.er*27)/outs).toFixed(2) : '—';
    totals.whip = outs ? (((totals.hits+totals.bb)*3)/outs).toFixed(2) : '—';
    totals.k9   = outs ? ((totals.so*27)/outs).toFixed(1) : '—';
    totals.wl   = `${totals.w}-${totals.l}`;
    return totals;
  }
}

async function loadPlayerYear(p, year) {
  const key = cacheKey(p.mlb_id, year);
  if (statsCache[key]) return; // already cached

  const group = p.type === 'pitcher' ? 'pitching' : 'hitting';
  const raw   = await fetchRawSplits(p.mlb_id, group, year);

  if (raw.length === 0) {
    statsCache[key] = { splits: [], totals: null };
    return;
  }

  const splits = groupSplitsByLevel(raw, p.type);
  splits.forEach(s => p.type === 'hitter' ? addHitterDerived(s) : addPitcherDerived(s));
  const totals = p.type === 'hitter' ? sumHitterGroups(splits) : sumPitcherGroups(splits);

  // Determine top-level team/level for display
  if (splits.length > 0) {
    totals.topTeam  = splits[0].team;
    totals.topLevel = splits[0].level;
    totals.allLevels = splits.map(s => s.level).join(' / ');
    totals.allTeams  = splits.map(s => s.team).join(' / ');
  }

  statsCache[key] = { splits, totals };
}

async function refreshAllStats() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('refreshing');
  btn.disabled = true;

  // Clear cache for current year so we force fresh data
  for (const p of players) {
    delete statsCache[cacheKey(p.mlb_id, currentYear)];
  }

  await Promise.all(players.map(p => loadPlayerYear(p, currentYear)));
  saveStatsCache(); // stats cache stays local

  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Updated ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  btn.classList.remove('refreshing');
  btn.disabled = false;
  isRefreshing = false;
  renderRoster();
  renderSummary();
  toast('Stats refreshed!', 'success');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtAvg(v) { return String(v||'.000'); }

function getAge(mlb_id) {
  const bio = playerBios[mlb_id];
  if (!bio) return null;
  if (bio.currentAge) return bio.currentAge;
  if (bio.birthDate) {
    const birth = new Date(bio.birthDate);
    const now   = new Date();
    let age = now.getFullYear() - birth.getFullYear();
    const m = now.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
    return age;
  }
  return null;
}

function hitterSplitRow(row, isTotal) {
  const avgFloat = parseFloat('0'+(row.avg||'.000'))||0;
  const opsFloat = parseFloat('0'+(row.ops||'.000'))||0;
  const isoFloat = parseFloat('0'+(row.iso||'.000'))||0;
  const cls = isTotal ? 'total-row' : '';
  const label = isTotal ? 'TOTAL' : `${row.level} — ${row.team}`;
  return `<tr class="${cls}">
    <td>${esc(label)}</td>
    <td>${row.g}</td>
    <td>${row.pa}</td>
    <td>${row.ab}</td>
    <td>${row.h}</td>
    <td>${row.hr}</td>
    <td>${row.rbi}</td>
    <td>${row.sb}</td>
    <td>${row.bb}</td>
    <td>${row.so}</td>
    <td class="${avgFloat>=.300?'good':avgFloat>=.250?'':'bad'}">${fmtAvg(row.avg)}</td>
    <td>${fmtAvg(row.obp)}</td>
    <td class="${opsFloat>=.850?'good':opsFloat>=.700?'':opsFloat<.600?'bad':''}">${fmtAvg(row.ops)}</td>
    <td class="${isoFloat>=.200?'good':''}">${fmtAvg(row.iso)}</td>
  </tr>`;
}

function pitcherSplitRow(row, isTotal) {
  const eraVal = parseFloat(row.era)||99;
  const cls = isTotal ? 'total-row' : '';
  const label = isTotal ? 'TOTAL' : `${row.level} — ${row.team}`;
  const k9Val = row.ipOuts ? ((row.so*27)/row.ipOuts).toFixed(1) : (row.k9||'—');
  return `<tr class="${cls}">
    <td>${esc(label)}</td>
    <td>${row.g}</td>
    <td>${row.ip||'0.0'}</td>
    <td>${row.w}-${row.l}</td>
    <td class="${eraVal<3.0?'good':eraVal>5.0?'bad':''}">${row.era||'—'}</td>
    <td>${row.whip||'—'}</td>
    <td>${row.so}</td>
    <td>${row.bb}</td>
    <td class="${parseFloat(k9Val)>=10?'good':''}">${k9Val}</td>
  </tr>`;
}

function makeHitterSplitsTable(splits, totals) {
  const header = `<tr>
    <th>Level / Team</th><th>G</th><th>PA</th><th>AB</th><th>H</th>
    <th>HR</th><th>RBI</th><th>SB</th><th>BB</th><th>SO</th>
    <th>AVG</th><th>OBP</th><th>OPS</th><th>ISO</th>
  </tr>`;
  const rows = splits.map(r => hitterSplitRow(r, false)).join('');
  const totalRow = splits.length > 1 ? hitterSplitRow(totals, true) : '';
  return `<table class="splits-table"><thead>${header}</thead><tbody>${rows}${totalRow}</tbody></table>`;
}

function makePitcherSplitsTable(splits, totals) {
  const header = `<tr>
    <th>Level / Team</th><th>G</th><th>IP</th><th>W-L</th>
    <th>ERA</th><th>WHIP</th><th>K</th><th>BB</th><th>K/9</th>
  </tr>`;
  const rows = splits.map(r => pitcherSplitRow(r, false)).join('');
  const totalRow = splits.length > 1 ? pitcherSplitRow(totals, true) : '';
  return `<table class="splits-table"><thead>${header}</thead><tbody>${rows}${totalRow}</tbody></table>`;
}

function statCell(label, value, cls='') {
  return `<div class="stat-cell"><div class="stat-lbl">${label}</div><div class="stat-val ${cls}">${value}</div></div>`;
}

function makeCard(p) {
  const isAllYears = currentYear === ALL_YEARS_KEY;

  // For single year view
  const key    = cacheKey(p.mlb_id, currentYear);
  const cached = isAllYears ? null : statsCache[key];
  const splits = isAllYears ? [] : (cached?.splits || []);

  // Totals — either single year or all-years rollup
  const totals = isAllYears
    ? getAllYearsTotals(p)
    : (cached?.totals || null);

  const hasStats = totals && (
    (p.type === 'hitter'  && totals.pa     > 0) ||
    (p.type === 'pitcher' && totals.ipOuts > 0)
  );
  const isExpanded      = expandedCards.has(p.mlb_id);
  const isYearsExpanded = expandedYears.has(p.mlb_id);

  // Age badge
  const age = getAge(p.mlb_id);
  const ageBadge = age
    ? `<span class="badge" style="background:#1f1a2e;border-color:#4a3a7a;color:#b09ae0;">Age ${age}</span>`
    : '';

  // Quick stat row
  let quickHtml = '';
  if (hasStats) {
    if (p.type === 'hitter') {
      const avgFloat = parseFloat('0'+(totals.avg||'.000'))||0;
      const opsFloat = parseFloat('0'+(totals.ops||'.000'))||0;
      const isoFloat = parseFloat('0'+(totals.iso||'.000'))||0;
      quickHtml = `<div class="quick-stats hitter">
        ${statCell('PA',  totals.pa)}
        ${statCell('HR',  totals.hr,  totals.hr>=5?'hot':'')}
        ${statCell('RBI', totals.rbi)}
        ${statCell('SB',  totals.sb,  totals.sb>=5?'hot':'')}
        ${statCell('AVG', fmtAvg(totals.avg), avgFloat>=.280?'good':'')}
        ${statCell('OBP', fmtAvg(totals.obp))}
        ${statCell('OPS', fmtAvg(totals.ops), opsFloat>=.850?'good':opsFloat<.600?'hot':'')}
        ${statCell('ISO', fmtAvg(totals.iso), isoFloat>=.200?'good':'')}
      </div>`;
    } else {
      const eraFloat = parseFloat(totals.era)||99;
      quickHtml = `<div class="quick-stats pitcher">
        ${statCell('G',    totals.g)}
        ${statCell('W-L',  totals.wl)}
        ${statCell('IP',   totals.ip)}
        ${statCell('ERA',  totals.era,  eraFloat<3.5?'good':eraFloat>5?'hot':'')}
        ${statCell('K',    totals.so,   totals.so>=20?'good':'')}
        ${statCell('BB',   totals.bb)}
        ${statCell('WHIP', totals.whip)}
      </div>`;
    }
  } else {
    const msg = isAllYears ? 'No stats found across any tracked year' : `No ${currentYear} stats yet`;
    quickHtml = `<div class="no-stats-msg">${msg}</div>`;
  }

  // ── SPLITS / DRILL-DOWN SECTION ──────────────────────────────────────────
  let splitsHtml = '';

  if (isAllYears && hasStats) {
    // All-years view: show year-by-year drill-down
    const yearsWithData = ALL_YEARS.filter(y => {
      const t = statsCache[cacheKey(p.mlb_id, y)]?.totals;
      return t && (t.pa > 0 || t.ipOuts > 0);
    });

    if (yearsWithData.length > 0) {
      const drillRows = yearsWithData.map(y => {
        const yt = statsCache[cacheKey(p.mlb_id, y)]?.totals;
        const ys = statsCache[cacheKey(p.mlb_id, y)]?.splits || [];
        const levelStr = ys.map(s=>s.level).join(' / ') || '—';
        const expandId = `yr-${p.mlb_id}-${y}`;
        const isYrOpen = expandedCards.has(expandId);

        // Year summary row
        let yearSummary = '';
        if (p.type === 'hitter') {
          const af = parseFloat('0'+(yt.avg||'.000'))||0;
          const of2 = parseFloat('0'+(yt.ops||'.000'))||0;
          yearSummary = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
            ${miniStat('PA', yt.pa)} ${miniStat('HR', yt.hr)}
            ${miniStat('SB', yt.sb)} ${miniStat('AVG', fmtAvg(yt.avg), af>=.280?'good':'')}
            ${miniStat('OPS', fmtAvg(yt.ops), of2>=.850?'good':of2<.600?'hot':'')}
            ${miniStat('ISO', fmtAvg(yt.iso))}
          </div>`;
        } else {
          const ef = parseFloat(yt.era)||99;
          yearSummary = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
            ${miniStat('IP', yt.ip)} ${miniStat('ERA', yt.era, ef<3.5?'good':ef>5?'hot':'')}
            ${miniStat('K', yt.so, yt.so>=20?'good':'')} ${miniStat('WHIP', yt.whip)}
          </div>`;
        }

        const levelTable = ys.length > 0
          ? (p.type === 'hitter'
              ? makeHitterSplitsTable(ys, yt)
              : makePitcherSplitsTable(ys, yt))
          : '';

        return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleYearDrill('${expandId}')">
            <div>
              <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.05em;color:var(--accent);">${y}</span>
              <span style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-left:8px;">${levelStr}</span>
            </div>
            <span id="arr-${expandId}" style="color:var(--muted);font-size:.75rem;transition:transform .15s;display:inline-block;${isYrOpen?'transform:rotate(90deg)':''}">▶</span>
          </div>
          ${yearSummary}
          <div id="${expandId}" style="display:${isYrOpen?'block':'none'};margin-top:8px;">
            ${levelTable}
          </div>
        </div>`;
      }).join('');

      splitsHtml = `<div class="splits-wrap" style="margin-top:8px;">
        <button class="splits-toggle ${isYearsExpanded?'open':''}"
          onclick="toggleYearsDrill(${p.mlb_id})">
          <span class="arrow">▶</span>
          Year-by-year breakdown · ${yearsWithData.join(', ')}
        </button>
        <div id="ydrills-${p.mlb_id}" style="display:${isYearsExpanded?'block':'none'};margin-top:8px;">
          ${drillRows}
        </div>
      </div>`;
    }

  } else if (!isAllYears && hasStats && splits.length > 0) {
    // Single year view: show level splits
    const tableHtml = p.type === 'hitter'
      ? makeHitterSplitsTable(splits, totals)
      : makePitcherSplitsTable(splits, totals);

    splitsHtml = `<div class="splits-wrap">
      <button class="splits-toggle ${isExpanded?'open':''}"
        onclick="toggleSplits(${p.mlb_id})">
        <span class="arrow">▶</span>
        ${splits.length} level${splits.length>1?'s':''}
        ${splits.length>1 ? '· '+splits.map(s=>s.level).join(' / ') : '· '+splits[0].level+' — '+splits[0].team}
      </button>
      <div id="splits-${p.mlb_id}" style="display:${isExpanded?'block':'none'}">
        ${tableHtml}
      </div>
    </div>`;
  }

  // Year history badges
  const yearBadges = ALL_YEARS.filter(y => {
    const t = statsCache[cacheKey(p.mlb_id, y)]?.totals;
    return t && (t.pa > 0 || t.ipOuts > 0);
  }).map(y => `<span class="badge badge-year">${y}</span>`).join('');

  // Level badge
  let levelBadge = '';
  if (!isAllYears && hasStats && totals.allLevels) {
    const levels = totals.allLevels.split(' / ');
    levelBadge = levels.map(lv => {
      const isMlb = lv === 'MLB';
      const style = isMlb
        ? 'background:#1a3a5c;border-color:#2060a0;color:#60b0ff;'
        : 'background:#1a2e1a;border-color:#1a5c1a;color:#6bdb6b;';
      return `<span class="badge" style="${style}">${lv}</span>`;
    }).join('');
  }

  return `<div class="player-card ${hasStats?'':'no-stats'} ${p.type}"
      data-type="${p.type}" data-hasstats="${hasStats}">
    <div class="card-top">
      <div>
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-meta">
          <span class="badge badge-pos">${p.pos}</span>
          ${ageBadge}
          ${levelBadge}
          ${yearBadges}
        </div>
      </div>
      <button class="card-remove" onclick="removePlayer(${p.mlb_id})" title="Remove">✕</button>
    </div>
    ${quickHtml}
    ${splitsHtml}
  </div>`;
}

function miniStat(label, value, cls='') {
  return `<span style="font-family:'DM Mono',monospace;font-size:.68rem;background:var(--surface3);border-radius:4px;padding:2px 6px;" class="${cls}">${label}: <span style="color:${cls==='good'?'var(--green)':cls==='hot'?'var(--accent)':'var(--text)'}">${value}</span></span>`;
}

function toggleYearsDrill(mlb_id) {
  const el = document.getElementById(`ydrills-${mlb_id}`);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (isOpen) expandedYears.delete(mlb_id);
  else        expandedYears.add(mlb_id);
  const btn = el.previousElementSibling;
  if (btn) btn.classList.toggle('open', !isOpen);
}

function toggleYearDrill(expandId) {
  const el  = document.getElementById(expandId);
  const arr = document.getElementById(`arr-${expandId}`);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arr) arr.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function toggleSplits(mlb_id) {
  const el = document.getElementById(`splits-${mlb_id}`);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (isOpen) expandedCards.delete(mlb_id);
  else        expandedCards.add(mlb_id);
  // Update toggle button appearance
  const btn = el.previousElementSibling;
  if (btn) btn.classList.toggle('open', !isOpen);
}

function getFilteredSorted() {
  let list = [...players];
  if (currentTab === 'hitters')  list = list.filter(p => p.type === 'hitter');
  if (currentTab === 'pitchers') list = list.filter(p => p.type === 'pitcher');
  if (currentTab === 'active')   list = list.filter(p => {
    const t = currentYear === ALL_YEARS_KEY ? getAllYearsTotals(p) : statsCache[cacheKey(p.mlb_id, currentYear)]?.totals;
    return t && (t.pa > 0 || t.ipOuts > 0);
  });
  if (currentTab === 'nostats')  list = list.filter(p => {
    const t = currentYear === ALL_YEARS_KEY ? getAllYearsTotals(p) : statsCache[cacheKey(p.mlb_id, currentYear)]?.totals;
    return !t || (t.pa === 0 && t.ipOuts === 0);
  });

  const sort = document.getElementById('sort-select')?.value || 'name';
  list.sort((a, b) => {
    const sa = currentYear === ALL_YEARS_KEY ? (getAllYearsTotals(a)||{}) : (statsCache[cacheKey(a.mlb_id, currentYear)]?.totals || {});
    const sb = currentYear === ALL_YEARS_KEY ? (getAllYearsTotals(b)||{}) : (statsCache[cacheKey(b.mlb_id, currentYear)]?.totals || {});
    if (sort==='name')  return a.name.localeCompare(b.name);
    if (sort==='level') return (sa.topLevel||'zzz').localeCompare(sb.topLevel||'zzz');
    if (sort==='pa')    return (sb.pa||0)-(sa.pa||0);
    if (sort==='avg')   return (parseFloat('0'+(sb.avg||'.000'))||0)-(parseFloat('0'+(sa.avg||'.000'))||0);
    if (sort==='hr')    return (sb.hr||0)-(sa.hr||0);
    if (sort==='sb')    return (sb.sb||0)-(sa.sb||0);
    if (sort==='ip')    return (sb.ipOuts||0)-(sa.ipOuts||0);
    if (sort==='era')   return (parseFloat(sa.era)||99)-(parseFloat(sb.era)||99);
    if (sort==='so')    return (sb.so||0)-(sa.so||0);
    if (sort==='ops')   return (parseFloat('0'+(sb.ops||'.000'))||0)-(parseFloat('0'+(sa.ops||'.000'))||0);
    if (sort==='iso')   return (parseFloat('0'+(sb.iso||'.000'))||0)-(parseFloat('0'+(sa.iso||'.000'))||0);
    return 0;
  });
  return list;
}

function renderRoster() {
  const container = document.getElementById('roster-container');
  const list = getFilteredSorted();

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚾</div>
      <div class="empty-title">No players here</div>
      <div class="empty-desc">Add prospects with the button above</div>
    </div>`;
    return;
  }

  const hitters  = list.filter(p => p.type === 'hitter');
  const pitchers = list.filter(p => p.type === 'pitcher');
  const showSections = (currentTab==='all'||currentTab==='active'||currentTab==='nostats') && hitters.length && pitchers.length;

  let html = '';
  if (hitters.length && currentTab !== 'pitchers') {
    if (showSections) html += `<div class="section-heading">Hitters</div>`;
    html += `<div class="player-grid">${hitters.map(makeCard).join('')}</div>`;
  }
  if (pitchers.length && currentTab !== 'hitters') {
    if (showSections) html += `<div class="section-heading" style="margin-top:2rem">Pitchers</div>`;
    html += `<div class="player-grid">${pitchers.map(makeCard).join('')}</div>`;
  }
  container.innerHTML = html;
}

function renderSummary() {
  const hitters  = players.filter(p=>p.type==='hitter');
  const pitchers = players.filter(p=>p.type==='pitcher');
  const withStats = players.filter(p => {
    const t = currentYear === ALL_YEARS_KEY ? getAllYearsTotals(p) : statsCache[cacheKey(p.mlb_id, currentYear)]?.totals;
    return t && (t.pa>0||t.ipOuts>0);
  });

  let totalHR=0, totalSB=0, bestAvg=0, bestAvgName='—';
  for (const p of hitters) {
    const t = currentYear === ALL_YEARS_KEY ? getAllYearsTotals(p) : statsCache[cacheKey(p.mlb_id, currentYear)]?.totals;
    if (!t||!t.pa) continue;
    totalHR += t.hr||0;
    totalSB += t.sb||0;
    const avg = parseFloat('0'+(t.avg||'.000'))||0;
    if (avg>bestAvg && t.pa>=20) { bestAvg=avg; bestAvgName=p.name.split(' ').pop(); }
  }

  let bestEra=99, bestEraName='—', totalK=0;
  for (const p of pitchers) {
    const t = currentYear === ALL_YEARS_KEY ? getAllYearsTotals(p) : statsCache[cacheKey(p.mlb_id, currentYear)]?.totals;
    if (!t||!t.ipOuts) continue;
    totalK += t.so||0;
    const era = parseFloat(t.era)||99;
    if (era<bestEra && t.ipOuts>=9) { bestEra=era; bestEraName=p.name.split(' ').pop(); }
  }

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Prospects</div>
      <div class="summary-value accent">${players.length}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Has Stats</div>
      <div class="summary-value green">${withStats.length}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total HR</div>
      <div class="summary-value">${totalHR}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total SB</div>
      <div class="summary-value">${totalSB}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Best AVG</div>
      <div class="summary-value amber" style="font-size:1.3rem;padding-top:4px">${bestAvg>0?('.'+((bestAvg*1000).toFixed(0).padStart(3,'0'))):'—'}</div>
      <div class="summary-sub">${bestAvgName}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total K</div>
      <div class="summary-value">${totalK}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Best ERA</div>
      <div class="summary-value amber" style="font-size:1.3rem;padding-top:4px">${bestEra<99?bestEra.toFixed(2):'—'}</div>
      <div class="summary-sub">${bestEraName}</div>
    </div>`;
}

function renderYearChips() {
  const container = document.getElementById('year-chips');
  const allBtn = `<button class="year-chip ${currentYear===ALL_YEARS_KEY?'active':''}"
    onclick="switchYear('${ALL_YEARS_KEY}',this)"
    style="${currentYear===ALL_YEARS_KEY?'':''}">All Years</button>`;
  const yearBtns = ALL_YEARS.map(y =>
    `<button class="year-chip ${y===currentYear?'active':''}" onclick="switchYear('${y}',this)">${y}</button>`
  ).join('');
  container.innerHTML = allBtn + yearBtns;
}

// ── YEAR SWITCHING ────────────────────────────────────────────────────────────
async function switchYear(year, el) {
  currentYear = year;
  const label = year === ALL_YEARS_KEY ? 'All Years' : `${year} Season`;
  document.getElementById('season-label').textContent = label;
  document.querySelectorAll('.year-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

  if (year === ALL_YEARS_KEY) {
    // Ensure all years are loaded
    const needsLoad = [];
    for (const y of ALL_YEARS) {
      const missing = players.filter(p => p.mlb_id && !statsCache[cacheKey(p.mlb_id, y)]);
      needsLoad.push(...missing.map(p => loadPlayerYear(p, y)));
    }
    if (needsLoad.length > 0) {
      document.getElementById('roster-container').innerHTML =
        `<div class="empty-state"><div class="loading-spinner"></div><div class="empty-desc" style="margin-top:.75rem">Loading all years…</div></div>`;
      await Promise.all(needsLoad);
      saveStatsCache();
    }
  } else {
    const missing = players.filter(p => p.mlb_id && !statsCache[cacheKey(p.mlb_id, year)]);
    if (missing.length > 0) {
      document.getElementById('roster-container').innerHTML =
        `<div class="empty-state"><div class="loading-spinner"></div><div class="empty-desc" style="margin-top:.75rem">Loading ${year} stats…</div></div>`;
      await Promise.all(missing.map(p => loadPlayerYear(p, year)));
      saveStatsCache();
    }
  }

  renderRoster();
  renderSummary();
}

// ── SEARCH & ADD ──────────────────────────────────────────────────────────────
// Pitcher position codes from the MLB API
const PITCHER_POSITIONS = new Set(['P','SP','RP','CP','MR','LR','SU','CL','SW']);

function inferType(pos) {
  return PITCHER_POSITIONS.has(pos) ? 'pitcher' : 'hitter';
}

async function searchPlayer() {
  const q = document.getElementById('search-input').value.trim();
  if (q.length < 2) return;
  const btn = document.getElementById('search-btn');
  const results = document.getElementById('search-results');
  btn.disabled = true;
  btn.textContent = 'Searching…';
  results.innerHTML = '<div class="search-status"><span class="loading-spinner"></span> Searching…</div>';
  try {
    // Run both endpoints in parallel:
    // 1) /people/search covers MiLB + some MLB
    // 2) /people?search= covers active MLB roster players more reliably
    const [r1, r2] = await Promise.allSettled([
      fetch(`${MLB_API}/people/search?names=${encodeURIComponent(q)}&sportIds=1,11,12,13,14,16,17`).then(r=>r.json()),
      fetch(`${MLB_API}/people?search=${encodeURIComponent(q)}&sportId=1&hydrate=currentTeam`).then(r=>r.json()),
    ]);

    // Merge results, dedupe by id
    const seen = new Map();
    for (const res of [r1, r2]) {
      if (res.status !== 'fulfilled') continue;
      const people = res.value.people || [];
      for (const p of people) {
        if (!seen.has(p.id)) seen.set(p.id, p);
      }
    }

    const people = [...seen.values()];

    if (people.length === 0) {
      results.innerHTML = '<div class="search-status">No players found. Try a different spelling.</div>';
      return;
    }

    // Sort: exact name matches first, then partial
    const ql = q.toLowerCase();
    people.sort((a, b) => {
      const aExact = a.fullName?.toLowerCase().startsWith(ql) ? 0 : 1;
      const bExact = b.fullName?.toLowerCase().startsWith(ql) ? 0 : 1;
      return aExact - bExact;
    });

    const addedIds = new Set(players.map(p => p.mlb_id));

    results.innerHTML = people.slice(0, 20).map(person => {
      const already  = addedIds.has(person.id);
      const pos      = person.primaryPosition?.abbreviation || '?';
      const team     = person.currentTeam?.name || 'Free Agent';
      // Determine if MLB or MiLB based on sport
      const sportId  = person.sport?.id || person.primarySport?.id;
      const isMlb    = sportId === 1 || (!sportId && person.mlbDebutDate);
      const levelTag = isMlb
        ? `<span style="font-family:'DM Mono',monospace;font-size:.6rem;background:#1a3a5c;border:1px solid #2060a0;color:#60b0ff;padding:1px 6px;border-radius:3px;margin-left:4px;">MLB</span>`
        : `<span style="font-family:'DM Mono',monospace;font-size:.6rem;background:#1a2e1a;border:1px solid #1a5c1a;color:#6bdb6b;padding:1px 6px;border-radius:3px;margin-left:4px;">MiLB</span>`;

      const detectedType = inferType(pos);
      const typeBadge = detectedType === 'pitcher'
        ? `<span style="font-family:'DM Mono',monospace;font-size:.6rem;background:#1a2a3a;border:1px solid var(--accent2);color:var(--accent2);padding:1px 6px;border-radius:3px;margin-left:4px;">Pitcher</span>`
        : `<span style="font-family:'DM Mono',monospace;font-size:.6rem;background:#2a1a2a;border:1px solid var(--accent);color:var(--accent);padding:1px 6px;border-radius:3px;margin-left:4px;">Hitter</span>`;

      return `<div class="result-item ${already ? 'already-added' : ''}"
          onclick="addFromSearch(${person.id},'${esc(person.fullName)}','${pos}','${esc(team)}','${detectedType}')">
        <div>
          <div class="result-name">${esc(person.fullName)} ${levelTag} ${typeBadge}</div>
          <div class="result-meta">${pos} · ${esc(team)} · ID: ${person.id}</div>
        </div>
        <button class="result-add">${already ? 'Added' : '+ Add'}</button>
      </div>`;
    }).join('');

  } catch(e) {
    results.innerHTML = `<div class="search-status" style="color:var(--red)">Search failed: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

async function addFromSearch(mlb_id, name, pos, team, detectedType) {
  if (players.find(p=>p.mlb_id===mlb_id)) { toast(`${name} already on roster`,'error'); return; }
  const type = detectedType || inferType(pos);
  const p = {name, mlb_id, pos, org:team, type};

  // Save to Supabase first
  const ok = await addPlayerToDb(p);
  if (!ok) return;

  // Realtime will add to local array for teammate, but we add immediately for ourselves
  if (!players.find(x => x.mlb_id === mlb_id)) players.push(p);

  toast(`${name} added! Loading stats…`, 'success');

  await Promise.all([fetchBio(mlb_id), ...ALL_YEARS.map(y => loadPlayerYear(p, y))]);
  saveStatsCache();

  renderRoster();
  renderSummary();
  toast(`${name} stats loaded!`, 'success');

  document.querySelectorAll('.result-item').forEach(item => {
    if (item.querySelector('.result-meta')?.textContent.includes(`ID: ${mlb_id}`)) {
      item.classList.add('already-added');
      item.querySelector('.result-add').textContent = 'Added';
    }
  });
}

function addManual() {
  const name = document.getElementById('manual-name').value.trim();
  const id   = parseInt(document.getElementById('manual-id').value);
  const pos  = document.getElementById('manual-pos').value.trim() || '?';
  if (!name||!id) { toast('Name and MLB ID required','error'); return; }
  if (players.find(p=>p.mlb_id===id)) { toast('Already on roster','error'); return; }
  const type = inferType(pos);
  const p = {name, mlb_id:id, pos, org:'?', type};
  document.getElementById('manual-name').value='';
  document.getElementById('manual-id').value='';
  document.getElementById('manual-pos').value='';

  addPlayerToDb(p).then(ok => {
    if (!ok) return;
    if (!players.find(x => x.mlb_id === id)) players.push(p);
    Promise.all([fetchBio(id), ...ALL_YEARS.map(y=>loadPlayerYear(p,y))]).then(()=>{
      saveStatsCache(); saveBios(); renderRoster(); renderSummary();
    });
    renderRoster();
    renderSummary();
    toast(`${name} added!`,'success');
  });
}

async function removePlayer(mlb_id) {
  const p = players.find(x=>x.mlb_id===mlb_id);
  if (!p) return;
  if (!confirm(`Remove ${p.name} from your roster? This will remove them for everyone.`)) return;

  const ok = await removePlayerFromDb(mlb_id);
  if (!ok) return;

  players = players.filter(x=>x.mlb_id!==mlb_id);
  ALL_YEARS.forEach(y => delete statsCache[cacheKey(mlb_id,y)]);
  expandedCards.delete(mlb_id);
  saveStatsCache();
  renderRoster(); renderSummary();
  toast(`${p.name} removed`,'success');
}

async function fetchGameLog(p) {
  const key = p.mlb_id;
  const cached = gameLogCache[key];
  // Use cache if less than 30 min old
  if (cached && Date.now() - cached.ts < 30 * 60 * 1000) return cached;

  const group  = p.type === 'pitcher' ? 'pitching' : 'hitting';
  const limit  = p.type === 'pitcher' ? 5 : 10; // fetch a few extra, display fewer
  const games  = [];

  // Try current year first, fall back to prior year if nothing found
  for (const year of ALL_YEARS) {
    for (const sportId of [1, 11, 12, 13, 14, 16]) {
      try {
        const url = `${MLB_API}/people/${p.mlb_id}/stats?stats=gameLog&season=${year}&group=${group}&sportId=${sportId}&limit=${limit}`;
        const r = await fetch(url);
        if (!r.ok) continue;
        const d = await r.json();
        for (const block of (d.stats || [])) {
          for (const split of (block.splits || [])) {
            split._year    = year;
            split._sportId = sportId;
            split._level   = SPORT_LABELS[sportId] || '?';
            games.push(split);
          }
        }
      } catch(e) {}
    }
    if (games.length > 0) break; // found games this year, stop
  }

  // Sort by date descending
  games.sort((a, b) => {
    const da = a.date || a.gameDate || '';
    const db = b.date || b.gameDate || '';
    return db.localeCompare(da);
  });

  const result = { ts: Date.now(), games: games.slice(0, limit) };
  gameLogCache[key] = result;
  return result;
}

function fmtGameDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  } catch(e) { return dateStr.slice(5, 10); }
}

function makeHitterGameEntry(split) {
  const s    = split.stat || {};
  const date = fmtGameDate(split.date || split.gameDate);
  const opp  = split.opponent?.abbreviation || split.team?.abbreviation || '?';
  const ha   = split.isHome === false ? `@ ${opp}` : `vs ${opp}`;
  const ab   = s.atBats    || 0;
  const h    = s.hits      || 0;
  const hr   = s.homeRuns  || 0;
  const rbi  = s.rbi       || 0;
  const bb   = s.baseOnBalls || 0;
  const sb   = s.stolenBases || 0;
  const k    = s.strikeOuts || 0;
  const avg  = ab ? (h/ab).toFixed(3).replace(/^0/,'') : '—';

  return `<div class="gamelog-entry">
    <div class="gamelog-entry-header">
      <span class="gamelog-date">${date}</span>
      <span class="gamelog-opponent">${ha}</span>
      <span class="gamelog-meta" style="margin:0;">${split._level}</span>
    </div>
    <div class="gamelog-stats">
      <div class="gl-stat"><div class="gl-stat-lbl">AB</div><div class="gl-stat-val">${ab}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">H</div><div class="gl-stat-val ${h>=3?'good':h===0&&ab>=3?'bad':''}">${h}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">HR</div><div class="gl-stat-val ${hr>0?'hot':''}">${hr}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">RBI</div><div class="gl-stat-val ${rbi>=3?'good':''}">${rbi}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">BB</div><div class="gl-stat-val">${bb}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">K</div><div class="gl-stat-val ${k>=3?'bad':''}">${k}</div></div>
      ${sb>0?`<div class="gl-stat"><div class="gl-stat-lbl">SB</div><div class="gl-stat-val good">${sb}</div></div>`:''}
    </div>
  </div>`;
}

function makePitcherGameEntry(split) {
  const s      = split.stat || {};
  const date   = fmtGameDate(split.date || split.gameDate);
  const opp    = split.opponent?.abbreviation || split.team?.abbreviation || '?';
  const ha     = split.isHome === false ? `@ ${opp}` : `vs ${opp}`;
  const raw    = parseFloat(s.inningsPitched || 0);
  const full   = Math.floor(raw);
  const frac   = Math.round((raw - full) * 10);
  const ip     = `${full}.${frac}`;
  const er     = s.earnedRuns  || 0;
  const so     = s.strikeOuts  || 0;
  const bb     = s.baseOnBalls || 0;
  const hits   = s.hits        || 0;
  const w      = s.wins        || 0;
  const l      = s.losses      || 0;
  const sv     = s.saves       || 0;
  const ipOuts = full * 3 + frac;
  const era    = ipOuts ? ((er * 27) / ipOuts).toFixed(2) : '—';
  const dec    = w ? 'W' : l ? 'L' : sv ? 'SV' : 'ND';
  const decCls = w||sv ? 'win' : l ? 'loss' : 'nd';
  const eraF   = parseFloat(era) || 99;

  return `<div class="gamelog-entry">
    <div class="gamelog-entry-header">
      <span class="gamelog-date">${date}</span>
      <span class="gamelog-opponent">${ha}</span>
      <span class="gamelog-result ${decCls}">${dec}</span>
      <span class="gamelog-meta" style="margin:0;">${split._level}</span>
    </div>
    <div class="gamelog-stats">
      <div class="gl-stat"><div class="gl-stat-lbl">IP</div><div class="gl-stat-val ${ipOuts>=15?'good':ipOuts<9?'bad':''}">${ip}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">H</div><div class="gl-stat-val">${hits}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">ER</div><div class="gl-stat-val ${er===0?'good':er>=4?'bad':''}">${er}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">BB</div><div class="gl-stat-val ${bb>=3?'bad':''}">${bb}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">K</div><div class="gl-stat-val ${so>=7?'good':''}">${so}</div></div>
      <div class="gl-stat"><div class="gl-stat-lbl">ERA</div><div class="gl-stat-val ${eraF<3?'good':eraF>6?'bad':''}">${era}</div></div>
    </div>
  </div>`;
}

function makeGameLogCard(p, logData) {
  const games   = logData?.games || [];
  const display = p.type === 'pitcher' ? games.slice(0, 2) : games.slice(0, 7);
  const age     = getAge(p.mlb_id);
  const ageBadge = age ? `<span class="badge" style="background:#1f1a2e;border-color:#4a3a7a;color:#b09ae0;">Age ${age}</span>` : '';

  // Check if recently added (within last 7 days based on created_at if available)
  const isNew = p._createdAt && (Date.now() - new Date(p._createdAt).getTime()) < 7 * 24 * 60 * 60 * 1000;
  const newBadge = isNew ? `<span class="new-badge">NEW</span>` : '';

  let entriesHtml = '';
  if (games.length === 0) {
    entriesHtml = `<div class="gamelog-empty">No recent games found</div>`;
  } else {
    entriesHtml = display.map(split =>
      p.type === 'pitcher' ? makePitcherGameEntry(split) : makeHitterGameEntry(split)
    ).join('');
  }

  const topLevel = games.length > 0 ? (games[0]._level || '?') : '—';

  return `<div class="gamelog-card ${p.type === 'pitcher' ? 'pitcher-card' : ''}">
    <div class="gamelog-header">
      <div>
        <div class="gamelog-name">${esc(p.name)}${newBadge}</div>
        <div class="gamelog-meta">
          ${p.pos} · ${topLevel}
          ${ageBadge}
        </div>
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);">
        ${p.type === 'pitcher' ? 'Last 2 outings' : 'Last 7 games'}
      </span>
    </div>
    <div class="gamelog-entries">${entriesHtml}</div>
  </div>`;
}

async function renderGameLogs() {
  const container = document.getElementById('roster-container');
  container.innerHTML = `<div class="gamelog-loading"><span class="loading-spinner"></span> Loading recent game logs…</div>`;

  // Fetch all game logs in parallel first
  const logMap = {};
  await Promise.all(players.map(async p => {
    logMap[p.mlb_id] = await fetchGameLog(p);
  }));

  // Sort each group by most recent game date descending
  function mostRecentDate(p) {
    const games = logMap[p.mlb_id]?.games || [];
    if (games.length === 0) return '';
    return games[0].date || games[0].gameDate || '';
  }

  const hitters  = [...players].filter(p => p.type === 'hitter')
    .sort((a, b) => mostRecentDate(b).localeCompare(mostRecentDate(a)));
  const pitchers = [...players].filter(p => p.type === 'pitcher')
    .sort((a, b) => mostRecentDate(b).localeCompare(mostRecentDate(a)));

  let html = '';

  if (pitchers.length) {
    html += `<div class="section-heading">Pitchers — Recent Outings</div>`;
    html += `<div class="gamelog-grid">${pitchers.map(p => makeGameLogCard(p, logMap[p.mlb_id])).join('')}</div>`;
  }

  if (hitters.length) {
    html += `<div class="section-heading" style="margin-top:2rem">Hitters — Last 7 Games</div>`;
    html += `<div class="gamelog-grid">${hitters.map(p => makeGameLogCard(p, logMap[p.mlb_id])).join('')}</div>`;
  }

  container.innerHTML = html;
}

let rankSortCol = 'fg_rank';
let rankSortDir = 'asc';
let rankFilter  = 'all';  // 'all', 'top100', 'top500', 'roster', 'hitter', 'pitcher'
let rankSearch  = '';
let rankOrg     = '';     // filter by org abbreviation e.g. 'NYY'

// Columns to fetch — excludes heavy grade columns initially
const RANK_COLS = 'mlb_id,name,fg_rank,fg_org_rank,fg_fv,eta,risk,current_level,hit_future,game_future,raw_future,spd_future,fld_future,fb_future,sl_future,cb_future,ch_future,cmd_future,hit_present,game_present,raw_present,spd_present,fld_present,fb_present,sl_present,cb_present,ch_present,cmd_present';

async function loadRankings() {
  if (rankingsCache && Date.now() - rankingsCache.ts < 60 * 60 * 1000) return;

  // Show loading state in container while fetching
  const container = document.getElementById('roster-container');
  if (container) {
    container.innerHTML = '<div class="no-rank-msg"><span class="loading-spinner"></span>&nbsp; Fetching rankings from database…</div>';
  }

  try {
    const url = `${SUPABASE_URL}/rest/v1/prospect_rankings?select=${RANK_COLS}&order=fg_rank.asc.nullslast&limit=1000`;
    console.log('[Rankings] Fetching:', url);
    const r = await fetch(url, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    console.log('[Rankings] Response:', r.status, r.statusText);
    if (!r.ok) {
      const errText = await r.text();
      console.error('[Rankings] Error body:', errText);
      throw new Error(`HTTP ${r.status}: ${errText}`);
    }
    const data = await r.json();
    console.log('[Rankings] Loaded', data.length, 'prospects');
    rankingsCache = { ts: Date.now(), prospects: Array.isArray(data) ? data : [] };
  } catch(e) {
    console.error('[Rankings] loadRankings failed:', e);
    rankingsCache = { ts: Date.now(), prospects: [] };
    if (container) {
      container.innerHTML = `<div class="no-rank-msg" style="color:var(--red);">
        Failed to load rankings: ${e.message}<br>
        <small>Check the browser console (F12) for details.</small>
      </div>`;
    }
  }
}

function fvClass(fv) {
  if (!fv) return 'fv-low';
  if (fv >= 70) return 'fv-70';
  if (fv >= 65) return 'fv-65';
  if (fv >= 60) return 'fv-60';
  if (fv >= 55) return 'fv-55';
  if (fv >= 50) return 'fv-50';
  return 'fv-low';
}

function riskClass(risk) {
  if (!risk) return '';
  const r = risk.toLowerCase();
  if (r === 'low') return 'risk-low';
  if (r === 'med') return 'risk-med';
  if (r === 'high') return 'risk-high';
  if (r === 'ext') return 'risk-ext';
  return '';
}

function gradeCell(present, future) {
  if (!present && !future) return '<td class="grade-cell" style="color:var(--border2)">—</td>';
  const val = future || present;
  const cls = val >= 60 ? 'grade-plus' : val >= 50 ? 'grade-avg' : 'grade-below';
  const display = (present && future && present !== future)
    ? `${present}/${future}`
    : `${val}`;
  return `<td class="grade-cell ${cls}">${display}</td>`;
}

function etaDisplay(eta) {
  if (!eta) return '<span class="eta-badge">—</span>';
  const year = parseInt(eta);
  const now  = new Date().getFullYear();
  if (year <= now) return `<span class="eta-badge eta-now">${eta}</span>`;
  return `<span class="eta-badge">${eta}</span>`;
}

function isHitterProspect(p) {
  // If they have any hitter grades, treat as hitter
  return !!(p.hit_future || p.hit_present || p.game_future || p.spd_future);
}

// How many rows to show at once
const RANK_PAGE_SIZE = 100;
let rankPage = 0;
let rankSearchTimer = null;
let rankFilteredList = [];

function buildRow(p, myIds, isHitterView) {
  const isOnRoster = myIds.has(p.mlb_id);
  const myBadge = isOnRoster ? '<span class="my-badge">MINE</span>' : '';
  const nameCls = isOnRoster ? 'my-player-name' : '';
  const rowCls  = isOnRoster ? 'my-player' : '';
  const fv      = p.fg_fv ? `<span class="fv-badge ${fvClass(p.fg_fv)}">${p.fg_fv}</span>` : '—';
  const risk    = p.risk  ? `<span class="${riskClass(p.risk)}">${p.risk}</span>` : '—';
  const level   = p.current_level ? `<span style="font-family:'DM Mono',monospace;font-size:.65rem;">${p.current_level}</span>` : '—';
  const hg = `${gradeCell(p.hit_present,p.hit_future)}${gradeCell(p.game_present,p.game_future)}${gradeCell(p.raw_present,p.raw_future)}${gradeCell(p.spd_present,p.spd_future)}${gradeCell(p.fld_present,p.fld_future)}`;
  const pg = `${gradeCell(p.fb_present,p.fb_future)}${gradeCell(p.sl_present,p.sl_future)}${gradeCell(p.cb_present,p.cb_future)}${gradeCell(p.ch_present,p.ch_future)}${gradeCell(p.cmd_present,p.cmd_future)}`;
  const orgRank = p.fg_org_rank ? `<span class="rank-num">#${p.fg_org_rank}</span>` : '—';
  return `<tr class="${rowCls}"><td class="rank-num">${p.fg_rank||'—'}</td><td><span class="rank-name ${nameCls}">${esc(p.name||'')}</span>${myBadge}</td><td>${fv}</td><td>${etaDisplay(p.eta)}</td><td>${risk}</td><td>${level}</td><td>${orgRank}</td>${isHitterView?hg:pg}</tr>`;
}

function getFilteredSortedList() {
  const myIds = new Set(players.map(p => p.mlb_id));
  let list = (rankingsCache?.prospects || []).filter(p => {
    if (rankFilter === 'top100')  { if (!p.fg_rank || p.fg_rank > 100)  return false; }
    if (rankFilter === 'top500')  { if (!p.fg_rank || p.fg_rank > 500)  return false; }
    if (rankFilter === 'roster')  { if (!myIds.has(p.mlb_id))           return false; }
    if (rankFilter === 'hitter')  { if (!isHitterProspect(p))           return false; }
    if (rankFilter === 'pitcher') { if (isHitterProspect(p))            return false; }
    // Org filter — match players on our roster who belong to that org
    if (rankOrg) {
      const orgIds = new Set(players.filter(pl => pl.org === rankOrg).map(pl => pl.mlb_id));
      if (!orgIds.has(p.mlb_id)) return false;
    }
    return true;
  });
  if (rankSearch.trim()) {
    const q = rankSearch.trim().toLowerCase();
    list = list.filter(p => p.name?.toLowerCase().includes(q));
  }
  list.sort((a, b) => {
    let av = a[rankSortCol], bv = b[rankSortCol];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') { av = av.toLowerCase(); bv = (bv||'').toLowerCase(); }
    const cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return rankSortDir === 'asc' ? cmp : -cmp;
  });
  return list;
}

function renderRankingsRows(list, page) {
  const myIds = new Set(players.map(p => p.mlb_id));
  const isHitterView = rankFilter !== 'pitcher';
  const start = 0;
  const end   = (page + 1) * RANK_PAGE_SIZE;
  const slice = list.slice(start, end);
  return slice.map(p => buildRow(p, myIds, isHitterView)).join('');
}

function renderRankingsView() {
  const container = document.getElementById('roster-container');
  if (!rankingsCache) {
    container.innerHTML = '<div class="no-rank-msg"><span class="loading-spinner"></span> Loading…</div>';
    return;
  }
  if (!rankingsCache.prospects.length) {
    container.innerHTML = '<div class="no-rank-msg">No rankings data found. Run update_rankings.py first.</div>';
    return;
  }

  rankFilteredList = getFilteredSortedList();
  rankPage = 0;

  const myIds      = new Set(players.map(p => p.mlb_id));
  const rosterHits = rankingsCache.prospects.filter(p => myIds.has(p.mlb_id)).length;
  const isHitterView = rankFilter !== 'pitcher';
  const updatedStr = new Date(rankingsCache.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Build org options from players on our roster
  const orgList = [...new Set(players.map(p => p.org).filter(Boolean))].sort();

    orgList.map(o => `<option value="${o}" ${rankOrg===o?'selected':''}>${o}</option>`).join('');

  function thSort(col, label, title='') {
    const active = rankSortCol === col;
    const arrow  = active ? (rankSortDir === 'asc' ? ' ↑' : ' ↓') : '';
    return `<th class="${active?'sorted':''}" onclick="sortRankings('${col}')" title="${title}">${label}${arrow}</th>`;
  }

  const gradeHeaders = isHitterView
    ? `${thSort('hit_future','HIT')}${thSort('game_future','PWR')}${thSort('raw_future','RAW')}${thSort('spd_future','SPD')}${thSort('fld_future','FLD')}`
    : `${thSort('fb_future','FB')}${thSort('sl_future','SL')}${thSort('cb_future','CB')}${thSort('ch_future','CH')}${thSort('cmd_future','CMD')}`;

  const initialRows = renderRankingsRows(rankFilteredList, 0);
  const hasMore     = rankFilteredList.length > RANK_PAGE_SIZE;

  container.innerHTML = `
    <div class="rankings-controls">
      <button class="rank-filter-chip ${rankFilter==='all'?'active':''}"     onclick="setRankFilter('all')">All (${rankingsCache.prospects.length})</button>
      <button class="rank-filter-chip ${rankFilter==='top100'?'active':''}"  onclick="setRankFilter('top100')">Top 100</button>
      <button class="rank-filter-chip ${rankFilter==='top500'?'active':''}"  onclick="setRankFilter('top500')">Top 500</button>
      <button class="rank-filter-chip ${rankFilter==='roster'?'active':''}"  onclick="setRankFilter('roster')">My Roster (${rosterHits})</button>
      <button class="rank-filter-chip ${rankFilter==='hitter'?'active':''}"  onclick="setRankFilter('hitter')">Hitters</button>
      <button class="rank-filter-chip ${rankFilter==='pitcher'?'active':''}" onclick="setRankFilter('pitcher')">Pitchers</button>
      <select class="sort-select" onchange="rankOrg=this.value;renderRankingsView()" style="font-size:.78rem;padding:5px 10px;">
        ${orgOptions}
      </select>
      <input class="rank-search" id="rank-search-input" type="text" placeholder="Search name…"
        value="${esc(rankSearch)}"
        oninput="clearTimeout(rankSearchTimer);rankSearchTimer=setTimeout(()=>{rankSearch=this.value;renderRankingsView();},250)" />
      <span class="rankings-meta">FanGraphs 2026 · ${rankFilteredList.length} prospects · Updated ${updatedStr}</span>
    </div>
    <div class="rankings-table-wrap">
      <table class="rankings-table">
        <thead><tr>
          ${thSort('fg_rank','Rank','Overall FanGraphs rank')}
          ${thSort('name','Name')}
          ${thSort('fg_fv','FV','Future Value (20-80)')}
          ${thSort('eta','ETA','Expected MLB debut')}
          ${thSort('risk','Risk')}
          ${thSort('current_level','Level')}
          ${thSort('fg_org_rank','Org #','Rank within organization')}
          ${gradeHeaders}
        </tr></thead>
        <tbody id="rank-tbody">${initialRows}</tbody>
      </table>
    </div>
    <div id="rank-load-more" style="text-align:center;padding:1rem;display:${hasMore?'block':'none'};">
      <button class="btn btn-ghost" onclick="loadMoreRankings()" style="font-size:.82rem;">
        Load more (${rankFilteredList.length - RANK_PAGE_SIZE} remaining)
      </button>
    </div>`;
}

function loadMoreRankings() {
  rankPage++;
  const myIds = new Set(players.map(p => p.mlb_id));
  const isHitterView = rankFilter !== 'pitcher';
  const start = rankPage * RANK_PAGE_SIZE;
  const end   = (rankPage + 1) * RANK_PAGE_SIZE;
  const slice = rankFilteredList.slice(start, end);
  const newRows = slice.map(p => buildRow(p, myIds, isHitterView)).join('');
  document.getElementById('rank-tbody').insertAdjacentHTML('beforeend', newRows);
  const remaining = rankFilteredList.length - end;
  const btn = document.getElementById('rank-load-more');
  if (remaining <= 0) {
    btn.style.display = 'none';
  } else {
    btn.querySelector('button').textContent = `Load more (${remaining} remaining)`;
  }
}

function setRankFilter(f) {
  rankFilter = f;
  // Auto-sort by org rank when roster view is selected
  if (f === 'roster' && rankSortCol === 'fg_rank') {
    rankSortCol = 'fg_org_rank';
  } else if (f !== 'roster' && rankSortCol === 'fg_org_rank') {
    rankSortCol = 'fg_rank';
  }
  renderRankingsView();
}

function sortRankings(col) {
  if (rankSortCol === col) {
    rankSortDir = rankSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    rankSortCol = col;
    rankSortDir = col === 'name' ? 'asc' : 'asc';
  }
  renderRankingsView();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  const hideChrome = tab === 'gamelogs' || tab === 'rankings';
  document.querySelector('.year-bar').style.display   = hideChrome ? 'none' : '';
  document.querySelector('.filter-row').style.display = hideChrome ? 'none' : '';
  document.getElementById('summary-bar').style.display = hideChrome ? 'none' : '';

  if (tab === 'gamelogs') {
    renderGameLogs();
  } else if (tab === 'rankings') {
    // Show loading state immediately
    document.getElementById('roster-container').innerHTML =
      '<div class="no-rank-msg"><span class="loading-spinner"></span> Loading rankings from database…</div>';
    loadRankings().then(() => renderRankingsView());
  } else {
    renderRoster();
  }
}
function openPanel() {
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('search-input').focus();
}
function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('search-results').innerHTML =
    '<div class="search-status">Search for a player above to add them to your roster</div>';
  document.getElementById('search-input').value='';
}
function handleOverlayClick(e) {
  if (e.target===document.getElementById('panel-overlay')) closePanel();
}
// setType() removed — type is now auto-detected from player position
function toast(msg,type='success') {
  const el = document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3000);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  loadStatsCache();
  loadBios();
  renderYearChips();
  renderSummary();
  renderRoster();

  // Load roster from Supabase
  await loadRoster();
  subscribeRealtime();

  // Load current year stats for any missing players
  const missing = players.filter(p => p.mlb_id && !statsCache[cacheKey(p.mlb_id, currentYear)]);
  if (missing.length > 0) {
    await Promise.all(missing.map(p => loadPlayerYear(p, currentYear)));
    saveStatsCache();
    const now = new Date();
    document.getElementById('last-updated').textContent =
      'Updated ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    renderRoster();
    renderSummary();
  }

  // Fetch bios for any players we don't have yet
  const missingBios = players.filter(p => p.mlb_id && !playerBios[p.mlb_id]);
  if (missingBios.length > 0) {
    await Promise.all(missingBios.map(p => fetchBio(p.mlb_id)));
    renderRoster();
  }

  // Background-load prior years quietly
  const priorYears = ALL_YEARS.filter(y=>y!==currentYear);
  for (const year of priorYears) {
    const m = players.filter(p => p.mlb_id && !statsCache[cacheKey(p.mlb_id, year)]);
    if (m.length > 0) {
      await Promise.all(m.map(p => loadPlayerYear(p, year)));
      saveStatsCache();
      renderRoster(); // re-render so year badges update
    }
  }
}

init();
</script>
